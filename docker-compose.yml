version: "3.9"

networks:
  lakehouse-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  spark-events:

services:

  # -----------------------------
  # PostgreSQL (Iceberg catalog)
  # -----------------------------
  postgres:
    image: postgres:15
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # MinIO (S3 storage)
  # -----------------------------
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # MinIO bucket bootstrap
  # -----------------------------
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb -p local/warehouse || true &&
      mc policy set public local/warehouse || true
      "
    networks:
      - lakehouse-net

  # -----------------------------
  # Iceberg REST Catalog
  # -----------------------------
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    environment:
      CATALOG_WAREHOUSE: s3://warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO

      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1

      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"

      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
    ports:
      - "8181:8181"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lakehouse-net

  # -----------------------------
  # Spark Master
  # -----------------------------
  spark-master:
    image: spark-base:latest
    container_name: spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - spark-events:/tmp/spark-events
    networks:
      - lakehouse-net
    command: ["/entrypoint.sh", "master"]

  # -----------------------------
  # Spark Worker 1
  # -----------------------------
  spark-worker-1:
    image: spark-base:latest
    container_name: spark-worker-1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - spark-events:/tmp/spark-events
    networks:
      - lakehouse-net
    command: ["/entrypoint.sh", "worker"]

  # -----------------------------
  # Spark Worker 2
  # -----------------------------
  spark-worker-2:
    image: spark-base:latest
    container_name: spark-worker-2
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    volumes:
      - spark-events:/tmp/spark-events
    networks:
      - lakehouse-net
    command: ["/entrypoint.sh", "worker"]

  # -----------------------------
  # Spark Thrift Server (SQL endpoint)
  # -----------------------------
  spark-thrift:
    image: spark-base:latest
    container_name: spark-thrift
    environment:
      SPARK_MODE: thrift
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master
      - iceberg-rest
    ports:
      - "10000:10000"
      - "4040:4040"
    volumes:
      - spark-events:/tmp/spark-events
    networks:
      - lakehouse-net
    command: ["/entrypoint.sh", "thrift"]