version: 2

models:
  - name: dim_customers
    description: "Customer dimension table with aggregated metrics"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: total_balance_usd
        description: "Total balance across all accounts"
      - name: total_loans
        description: "Total number of active loans"
      - name: credit_score
        description: "Customer's credit score"
      - name: customer_segment
        description: "Customer segment classification"

  - name: fct_transactions
    description: "Transaction fact table"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: amount_usd
        description: "Transaction amount"
      - name: transaction_date
        description: "Date of transaction"
      - name: transaction_risk_flag
        description: "Risk flag for anomaly detection"

  - name: fct_account_summary
    description: "Account summary with transaction metrics"
    columns:
      - name: account_id
        tests:
          - unique
          - not_null
      - name: current_balance
        description: "Current account balance"
      - name: activity_level
        description: "Account activity classification"